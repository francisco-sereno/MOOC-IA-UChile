<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expediente del caso: IA generativa para la transición profesional</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
        .border-pantone-blue { border-color: #0033A0; }
        .bg-pantone-blue { background-color: #0033A0; }
        .bg-pantone-blue-light { background-color: #E6EAF6; }
        .text-pantone-blue { color: #0033A0; }
        
        .border-pantone-yellow { border-color: #FFD100; }
        .bg-pantone-yellow { background-color: #FFD100; }
        .bg-pantone-yellow-light { background-color: #FFF9E6; }
        .text-pantone-yellow { color: #E6A200; }

        .border-pantone-green { border-color: #009639; }
        .bg-pantone-green { background-color: #009639; }
        .bg-pantone-green-light { background-color: #E6F5EB; }
        .text-pantone-green { color: #009639; }

        .border-pantone-red { border-color: #E3000F; }
        .bg-pantone-red { background-color: #E3000F; }
        .bg-pantone-red-light { background-color: #FDE6E7; }
        .text-pantone-red { color: #E3000F; }

        .main-nav-btn {
            transition: all 0.3s ease;
        }
        .main-nav-btn.active {
            border-color: #0033A0;
            color: #0033A0;
            background-color: #E6EAF6;
        }

        .presentation-nav-btn {
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }
        .presentation-nav-btn.active {
            font-weight: 600;
        }
        .presentation-content-pane {
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .presentation-content-pane.hidden {
            opacity: 0;
            transform: scale(0.98);
        }
        
        .module-button {
            transition: all 0.3s ease-in-out;
        }
        .module-button.active {
            transform: translateX(10px);
            font-weight: 700;
        }
        .module-content {
            transition: all 0.4s ease-in-out;
            border-left-width: 4px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="container mx-auto p-4 md:p-8 max-w-6xl">
        
        <header class="text-center mb-8">
            <div class="inline-block bg-pantone-blue p-3 rounded-xl shadow-md mx-auto mb-4">
                <i class="fas fa-file-alt text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900">Expediente del caso</h1>
        </header>

        <section id="instructions-box" class="bg-blue-50 border border-blue-200 text-blue-800 px-4 py-3 rounded-lg relative mb-8 shadow-sm transition-opacity duration-500">
            <div class="flex items-start">
                <i class="fas fa-info-circle text-2xl mr-3 mt-1"></i>
                <div>
                    <strong class="font-bold">Instrucciones de uso</strong>
                    <p class="block sm:inline text-sm ml-2">Utilice las pestañas para navegar entre la presentación del caso y el detalle de las situaciones que enfrentará Isabella Andrea en cada módulo.</p>
                </div>
                <button id="close-instructions" class="ml-auto -mt-2 -mr-2 p-2" aria-label="Cerrar instrucciones">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </section>

        <nav class="flex flex-wrap justify-center border-b-2 border-gray-200 mb-8">
            <button class="main-nav-btn text-lg font-semibold py-3 px-6 border-b-4" data-target="view-presentacion">
                <i class="fas fa-briefcase mr-2"></i>Presentación del caso
            </button>
            <button class="main-nav-btn text-lg font-semibold py-3 px-6 border-b-4" data-target="view-viaje">
                <i class="fas fa-tasks mr-2"></i>Situaciones y tareas
            </button>
        </nav>

        <div id="views-container">

            <section id="view-presentacion" class="view">
                <div class="bg-white rounded-lg shadow-lg p-6 md:p-8">
                    <nav id="presentation-nav" class="flex flex-wrap justify-center border-b border-gray-200 mb-6"></nav>
                    <div id="presentation-content-container" class="min-h-[150px]"></div>
                </div>
            </section>

            <section id="view-viaje" class="view hidden">
                <main class="grid grid-cols-1 md:grid-cols-12 gap-8">
                    <nav class="md:col-span-4 lg:col-span-3">
                        <h2 class="text-xl font-bold mb-4 text-gray-700">Módulos</h2>
                        <div id="module-navigation" class="space-y-2"></div>
                    </nav>
                    <section id="module-content-area" class="md:col-span-8 lg:col-span-9 min-h-[400px]">
                        <div id="module-content" class="bg-white p-6 md:p-8 rounded-lg shadow-lg module-content">
                            <div class="flex items-center justify-between mb-4">
                                <h3 id="module-title" class="text-2xl font-bold"></h3>
                            </div>
                            <div class="space-y-6">
                                <div>
                                    <h4 class="text-lg font-semibold text-gray-700 mb-2">Situación:</h4>
                                    <p id="module-situation" class="text-gray-600 leading-relaxed text-justify"></p>
                                </div>
                                <div>
                                    <h4 class="text-lg font-semibold text-gray-700 mb-2">Tarea:</h4>
                                    <p id="module-task" class="text-gray-600 leading-relaxed text-justify"></p>
                                </div>
                            </div>
                        </div>
                    </section>
                </main>
            </section>
        </div>

        <footer class="text-center mt-12 pt-8 border-t border-gray-200">
            <p class="text-gray-500">&copy; 2025 Expediente de caso personalizado</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const instructionsBox = document.getElementById('instructions-box');
            const closeInstructionsBtn = document.getElementById('close-instructions');
            if (closeInstructionsBtn) {
                closeInstructionsBtn.addEventListener('click', () => {
                    instructionsBox.style.opacity = '0';
                    setTimeout(() => instructionsBox.style.display = 'none', 500);
                });
            }

            const mainNavButtons = document.querySelectorAll('.main-nav-btn');
            const views = document.querySelectorAll('.view');

            function switchView(targetId) {
                views.forEach(view => view.classList.toggle('hidden', view.id !== targetId));
                mainNavButtons.forEach(button => button.classList.toggle('active', button.dataset.target === targetId));
            }

            mainNavButtons.forEach(button => {
                button.addEventListener('click', () => switchView(button.dataset.target));
            });

            switchView('view-presentacion');

            const presentationData = [
                { id: 'caso', title: '¿De qué se trata este caso?', icon: 'fa-user-tie', color: 'blue', content: 'Isabella Andrea es una profesional competente con valiosa experiencia en roles administrativos, operativos y de gestión. A pesar de sus habilidades, se siente estancada y aspira a un rol de mayor responsabilidad. El proceso de postulación laboral moderno le resulta abrumador, especialmente al intentar traducir su experiencia práctica al lenguaje corporativo que exigen los sistemas de selección automatizados (ATS). Ha oído hablar de la <strong>inteligencia artificial generativa</strong> como una posible solución, pero le preocupa su complejidad y la posible falta de autenticidad en los resultados.' },
                { id: 'logro', title: '¿Qué queremos lograr con este caso?', icon: 'fa-bullseye', color: 'yellow', content: 'Que los participantes del curso aprendan a asesorar a Isabella en el uso estratégico de la <strong>IA generativa</strong> como un asistente profesional para su transición laboral. El objetivo es que ella pueda optimizar su CV, redactar cartas de presentación de alto impacto y prepararse para entrevistas de manera eficiente y auténtica.' },
                { id: 'metodologia', title: '¿Cómo vamos a trabajar?', icon: 'fa-sitemap', color: 'green', content: 'Mediante el aprendizaje basado en casos, abordaremos en cuatro módulos los desafíos específicos de Isabella, aplicando herramientas de <strong>IA generativa</strong> para desarrollar soluciones prácticas y efectivas.' }
            ];
            const presentationNav = document.getElementById('presentation-nav');
            const presentationContentContainer = document.getElementById('presentation-content-container');

            presentationData.forEach((item, index) => {
                const button = document.createElement('button');
                button.className = `presentation-nav-btn px-4 py-3 text-sm md:text-base text-gray-600 hover:text-gray-900 border-pantone-${item.color}`;
                button.textContent = item.title;
                button.dataset.target = item.id;
                presentationNav.appendChild(button);

                const contentPane = document.createElement('div');
                contentPane.id = item.id;
                contentPane.className = 'presentation-content-pane';
                if (index !== 0) contentPane.classList.add('hidden');
                contentPane.innerHTML = `<div class="flex items-start"><i class="fas ${item.icon} text-3xl text-pantone-${item.color} mr-4 mt-1"></i><div><h3 class="font-bold text-xl mb-2 text-gray-800">${item.title}</h3><p class="text-gray-600 leading-relaxed text-justify">${item.content}</p></div></div>`;
                presentationContentContainer.appendChild(contentPane);

                button.addEventListener('click', () => {
                    presentationNav.querySelectorAll('.presentation-nav-btn').forEach(btn => {
                        const itemData = presentationData.find(d => d.id === btn.dataset.target);
                        if (itemData) btn.classList.remove('active', `text-pantone-${itemData.color}`, `border-pantone-${itemData.color}`);
                    });
                    button.classList.add('active', `text-pantone-${item.color}`, `border-pantone-${item.color}`);
                    presentationContentContainer.querySelectorAll('.presentation-content-pane').forEach(pane => pane.classList.add('hidden'));
                    document.getElementById(item.id).classList.remove('hidden');
                });
            });
            const firstPresentationButton = presentationNav.querySelector('.presentation-nav-btn');
            if(firstPresentationButton) firstPresentationButton.classList.add('active', `text-pantone-blue`, `border-pantone-blue`);

            const modules = [
                { id: 1, title: "Módulo 1: El diagnóstico de competencias", situation: "Isabella no sabe cómo conectar su experiencia con las competencias que buscan los roles a los que aspira. Necesita 'traducir' sus logros a un formato que los reclutadores y los sistemas ATS entiendan y valoren.", task: "Aprenderemos a usar la <strong>IA generativa</strong> para analizar el historial de Isabella y extraer las competencias clave, alineándolas con las descripciones de los cargos de su interés.", color: "blue" },
                { id: 2, title: "Módulo 2: La optimización del CV y la carta de presentación", situation: "Adaptar su CV y escribir una carta de presentación para cada oferta le consume una cantidad de tiempo desmesurada, y los resultados no la convencen.", task: "Aprenderemos a formular 'prompts' efectivos para que la <strong>IA generativa</strong> cree versiones optimizadas de su CV y borradores de cartas de presentación personalizadas y persuasivas en minutos.", color: "yellow" },
                { id: 3, title: "Módulo 3: La simulación de entrevistas", situation: "Isabella se siente insegura al enfrentar entrevistas para roles nuevos, ya que no sabe cómo presentar su experiencia de manera convincente para un puesto de mayor responsabilidad.", task: "Diseñaremos un 'simulador de entrevistas' con <strong>IA generativa</strong> que genere preguntas realistas basadas en la oferta laboral y su perfil, permitiéndole practicar y pulir sus respuestas.", color: "green" },
                { id: 4, title: "Módulo 4: La autenticidad y la ética en la IA generativa", situation: "A Isabella le preocupa que sus postulaciones suenen impersonales o 'hechas por un robot'. Quiere usar la IA generativa sin perder su voz y asegurándose de que el proceso sea ético.", task: "Aprenderemos a editar y refinar los textos generados por IA generativa para inyectarles la personalidad de Isabella. Analizaremos los sesgos potenciales de la IA generativa en la selección de personal y propondremos un uso responsable.", color: "red" }
            ];

            const navigationContainer = document.getElementById('module-navigation');
            const contentArea = document.getElementById('module-content');
            const titleEl = document.getElementById('module-title');
            const situationEl = document.getElementById('module-situation');
            const taskEl = document.getElementById('module-task');

            function displayModule(moduleId) {
                const module = modules.find(m => m.id === moduleId);
                if (!module) return;

                titleEl.textContent = module.title;
                situationEl.innerHTML = module.situation;
                taskEl.innerHTML = module.task;
                contentArea.className = `bg-white p-6 md:p-8 rounded-lg shadow-lg module-content border-pantone-${module.color}`;
                titleEl.className = `text-2xl font-bold text-pantone-${module.color}`;

                navigationContainer.querySelectorAll('.module-button').forEach(btn => {
                    const btnModule = modules.find(m => m.id === parseInt(btn.dataset.moduleId));
                    if (btnModule) btn.classList.remove('active', `bg-pantone-${btnModule.color}-light`, `text-pantone-${btnModule.color}`);
                    if (parseInt(btn.dataset.moduleId) === moduleId) {
                        btn.classList.add('active', `bg-pantone-${module.color}-light`, `text-pantone-${module.color}`);
                    }
                });
            }

            modules.forEach((module) => {
                const button = document.createElement('button');
                button.className = 'w-full text-left p-4 rounded-lg module-button hover:bg-gray-100 hover:font-bold';
                button.dataset.moduleId = module.id;
                button.innerHTML = `<span class="font-semibold">Módulo ${module.id}:</span> <span class="block text-sm text-gray-600">${module.title.split(':')[1].trim()}</span>`;
                button.addEventListener('click', () => displayModule(module.id));
                navigationContainer.appendChild(button);
            });

            displayModule(1);
        });
    </script>

</body>
</html>
